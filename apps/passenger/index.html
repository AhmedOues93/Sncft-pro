<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNCFT Passenger</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>SNCFT Passenger (API)</h1>
    <section class="card">
      <label>API Base URL <input id="apiBaseUrl" /></label>
      <button id="saveApiConfig">Enregistrer</button>
    </section>

    <section class="card">
      <h2>Recherche</h2>
      <div class="row">
        <div class="field">
          <label>Départ</label>
          <input id="originInput" autocomplete="off" placeholder="Tunis Ville" />
          <ul id="originSuggestions" class="suggestions"></ul>
        </div>
        <div class="field">
          <label>Destination</label>
          <input id="destinationInput" autocomplete="off" placeholder="Hammam Lif" />
          <ul id="destinationSuggestions" class="suggestions"></ul>
        </div>
      </div>
      <div class="row">
        <label>Date <input id="dateInput" type="date" /></label>
        <label>Heure <input id="timeInput" type="time" value="05:00" /></label>
        <label>Personnes <input id="passengersInput" type="number" min="1" value="1" /></label>
      </div>
      <button id="searchBtn">Rechercher</button>
      <p id="searchState" class="state"></p>
    </section>

    <section class="card">
      <h2>Résultats</h2>
      <div id="results"></div>
      <div class="row">
        <button id="prevBtn">Précédent</button>
        <button id="nextBtn">Suivant</button>
      </div>
    </section>

    <section class="card">
      <h2>Détails</h2>
      <div id="details">Sélectionnez un trajet.</div>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
